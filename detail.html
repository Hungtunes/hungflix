<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết phim | Hungflix/title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { netflix: '#0f0f0f', redNetflix: '#e50914' } } }
        }
    </script>
</head>
<body class="bg-netflix text-white font-sans antialiased min-h-screen">
    <nav class="w-full transition-all duration-300 bg-netflix p-4 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-gray-800">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-redNetflix text-3xl font-bold tracking-wider">HUNGFLIX</a>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-white">
                <a href="index.html" class="hover:text-gray-300 transition">Trang chủ</a>
                <a href="category.html?slug=phim-le" class="hover:text-gray-300 transition">Phim Lẻ</a>
                <a href="category.html?slug=phim-bo" class="hover:text-gray-300 transition">Phim Bộ</a>
                <a href="category.html?slug=hoat-hinh" class="hover:text-gray-300 transition">Hoạt Hình</a>
                <a href="category.html?slug=tv-shows" class="hover:text-gray-300 transition">TV Shows</a>
            </div>
        </div>

        <div class="relative w-full md:w-64">
            <form action="search.html" method="GET" class="flex items-center">
                <input type="text" id="global-search" name="keyword" required placeholder="Tên phim, đạo diễn..." 
                       class="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-full px-4 py-2 focus:outline-none focus:border-redNetflix focus:bg-black transition-all placeholder-gray-400">
                <button type="submit" class="absolute right-3 text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </form>
        </div>
    </nav>

    <main id="detail-container" class="max-w-7xl mx-auto px-4 py-8 flex flex-col items-center justify-center min-h-[70vh]">
        <div class="animate-pulse flex space-x-4 w-full">
            <div class="rounded bg-gray-700 h-96 w-64"></div>
            <div class="flex-1 space-y-4 py-1">
                <div class="h-8 bg-gray-700 rounded w-3/4"></div>
                <div class="space-y-2">
                    <div class="h-4 bg-gray-700 rounded"></div>
                    <div class="h-4 bg-gray-700 rounded w-5/6"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/detail.js"></script>
</body>
</html>
